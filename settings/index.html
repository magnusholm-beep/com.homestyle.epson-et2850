<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 20px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    .device {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .device-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .device-address {
      font-size: 12px;
      color: #888;
      margin-bottom: 14px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #f0f0f0;
    }

    .info-item {}

    .info-label {
      font-size: 10px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }

    .info-value {
      font-size: 13px;
      color: #333;
      font-weight: 500;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .ink { margin-bottom: 12px; }
    .ink:last-child { margin-bottom: 0; }

    .ink-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #666;
      margin-bottom: 5px;
    }

    .ink-track {
      height: 10px;
      background: #ebebeb;
      border-radius: 5px;
      overflow: hidden;
    }

    .ink-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 0.4s ease;
    }

    .ink-black   .ink-fill { background: #000000; }
    .ink-cyan    .ink-fill { background: #00AEEF; }
    .ink-magenta .ink-fill { background: #EC008C; }
    .ink-yellow  .ink-fill { background: #FFF200; }

    .message {
      color: #888;
      font-size: 14px;
      text-align: center;
      padding: 24px 0;
    }

    .refresh-btn {
      display: block;
      margin: 0 auto 20px;
      padding: 8px 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      color: #444;
    }

    .refresh-btn:hover { background: #f0f0f0; }
  </style>
</head>
<body>
  <h1>Printer Status</h1>
  <button class="refresh-btn" onclick="load()">Refresh</button>
  <div id="content"><p class="message">Loading...</p></div>

  <script>
    const INKS = [
      { key: 'black',   label: 'Black',   cls: 'ink-black'   },
      { key: 'cyan',    label: 'Cyan',    cls: 'ink-cyan'    },
      { key: 'magenta', label: 'Magenta', cls: 'ink-magenta' },
      { key: 'yellow',  label: 'Yellow',  cls: 'ink-yellow'  },
    ];

    function infoItem(label, value) {
      if (!value && value !== 0) return '';
      return `
        <div class="info-item">
          <div class="info-label">${label}</div>
          <div class="info-value">${value}</div>
        </div>`;
    }

    function render(devices) {
      const el = document.getElementById('content');

      if (!devices || devices.length === 0) {
        el.innerHTML = '<p class="message">No printers paired yet.</p>';
        return;
      }

      el.innerHTML = devices.map(device => {
        const info = device.info || {};
        const infoItems = [
          infoItem('Model',    info.model),
          infoItem('Serial',   info.serial),
          infoItem('Firmware', info.firmware),
          infoItem('Speed',    info.ppm != null ? info.ppm + ' ppm' : null),
        ].filter(Boolean).join('');

        const inkBars = INKS.map(ink => {
          const level = device.levels[ink.key];
          const pct   = typeof level === 'number' && level >= 0 ? level : 0;
          const label = typeof level === 'number' && level >= 0 ? level + '%' : '—';
          return `
            <div class="ink ${ink.cls}">
              <div class="ink-label">
                <span>${ink.label}</span>
                <span>${label}</span>
              </div>
              <div class="ink-track">
                <div class="ink-fill" style="width:${pct}%"></div>
              </div>
            </div>`;
        }).join('');

        return `
          <div class="device">
            <div class="device-name">${device.name}</div>
            <div class="device-address">${device.address || '—'}</div>
            ${infoItems ? `<div class="info-grid">${infoItems}</div>` : ''}
            <div class="section-title">Ink levels</div>
            ${inkBars}
          </div>`;
      }).join('');
    }

    function load() {
      document.getElementById('content').innerHTML = '<p class="message">Loading...</p>';
      Homey.api('GET', '/ink_levels', function(err, devices) {
        if (err) {
          document.getElementById('content').innerHTML = '<p class="message">Failed to load printer data.</p>';
          return;
        }
        render(devices);
      });
    }

    function onHomeyReady(Homey) {
      load();
      Homey.ready();
    }
  </script>
</body>
</html>
