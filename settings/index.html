<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 20px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    .device {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .device-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 14px;
    }

    .ink {
      margin-bottom: 12px;
    }

    .ink:last-child { margin-bottom: 0; }

    .ink-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #666;
      margin-bottom: 5px;
    }

    .ink-track {
      height: 10px;
      background: #ebebeb;
      border-radius: 5px;
      overflow: hidden;
    }

    .ink-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 0.4s ease;
    }

    .ink-black   .ink-fill { background: #1a1a1a; }
    .ink-cyan    .ink-fill { background: #00b4d8; }
    .ink-magenta .ink-fill { background: #e040fb; }
    .ink-yellow  .ink-fill { background: #fdd835; }
    .low         .ink-fill { background: #e53935 !important; }

    .message {
      color: #888;
      font-size: 14px;
      text-align: center;
      padding: 24px 0;
    }

    .refresh-btn {
      display: block;
      margin: 0 auto 20px;
      padding: 8px 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      color: #444;
    }

    .refresh-btn:hover { background: #f0f0f0; }
  </style>
</head>
<body>
  <h1>Ink Levels</h1>
  <button class="refresh-btn" onclick="load()">Refresh</button>
  <div id="content"><p class="message">Loading...</p></div>

  <script>
    const INKS = [
      { key: 'black',   label: 'Black',   cls: 'ink-black'   },
      { key: 'cyan',    label: 'Cyan',    cls: 'ink-cyan'    },
      { key: 'magenta', label: 'Magenta', cls: 'ink-magenta' },
      { key: 'yellow',  label: 'Yellow',  cls: 'ink-yellow'  },
    ];

    function render(devices) {
      const el = document.getElementById('content');

      if (!devices || devices.length === 0) {
        el.innerHTML = '<p class="message">No printers paired yet.</p>';
        return;
      }

      el.innerHTML = devices.map(device => `
        <div class="device">
          <div class="device-name">${device.name}</div>
          ${INKS.map(ink => {
            const level = device.levels[ink.key];
            const pct   = typeof level === 'number' && level >= 0 ? level : 0;
            const label = typeof level === 'number' && level >= 0 ? level + '%' : '—';
            const low   = typeof level === 'number' && level < 15 ? 'low' : '';
            return `
              <div class="ink ${ink.cls} ${low}">
                <div class="ink-label">
                  <span>${ink.label}</span>
                  <span>${label}</span>
                </div>
                <div class="ink-track">
                  <div class="ink-fill" style="width:${pct}%"></div>
                </div>
              </div>`;
          }).join('')}
        </div>
      `).join('');
    }

    function load() {
      document.getElementById('content').innerHTML = '<p class="message">Loading...</p>';
      Homey.api('GET', '/ink_levels', function(err, devices) {
        if (err) {
          document.getElementById('content').innerHTML = '<p class="message">Failed to load ink levels.</p>';
          return;
        }
        render(devices);
      });
    }

    function onHomeyReady(Homey) {
      load();
      Homey.ready();
    }
  </script>
</body>
</html>
